# Hermetic local-demo source config (dev-guide 04-review-drafts).
# The one entry below intentionally matches NO files, so the LLM-backed wikify
# pipeline never runs and the whole demo is ZERO-LLM (Postgres + uv only — no
# Ollama, no Azure). All demo content comes from the git_metadata connector,
# which the build appends automatically: one deterministic `commit` artifact per
# repo commit (now keyword-searchable), exercising connectors -> incremental
# build -> indexing -> activation -> the broker tools end to end.
version: 1
defaults:
  acl_teams: []
sources:
  - name: zero-llm-placeholder
    type: github_code
    repo: RohitSh26/agentic-kb-platform
    branch: main
    include:
      - "__intentionally_matches_nothing__/**/*.py"
    auth:
      token_env: GITHUB_TOKEN
