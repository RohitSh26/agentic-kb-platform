# Code + docs LOCAL build for `scripts/bootstrap.sh --with-docs` (docs/dev-guide/how-to/switch-llm-providers.md).
# Same code scope as local-code-sources.yaml, PLUS this repo's own markdown docs so docify
# (Graphify's LLM doc extractor, ADR-0023) has something to summarize. Still --backend local
# (reads this checkout; no GitHub/ADO token is ever resolved for it) — the ONLY extra
# requirement over the zero-LLM default is a chat model for the docs (LLM_PROVIDER / LLM_API_KEY
# / LLM_MODEL — a Groq key is cheap/fast; see docs/dev-guide/how-to/switch-llm-providers.md and the repo-root .env).
#
# Deliberately narrower than services/kb-builder/sources.example.yaml: that file also lists
# azure_wiki/ado_card sources, which are remote-only and are NOT filtered out by --backend
# local — the local filesystem backend has no path-selection for those types, so they end up
# matching (and failing to extract) every file in the workspace. Keep this file to the two
# locally-fetchable, path-selecting types (github_code, github_doc) for --backend local.
version: 1
defaults:
  acl_teams: []          # [] = org-public (any authenticated subject)
sources:
  - name: platform-code
    type: github_code
    repo: RohitSh26/agentic-kb-platform
    branch: main
    include:
      - "services/**/*.py"
    auth:
      token_env: GITHUB_TOKEN   # ignored by --backend local (reads local files)

  - name: platform-docs
    type: github_doc
    repo: RohitSh26/agentic-kb-platform
    branch: main
    include:
      - "docs/**/*.md"
      - "README.md"
    auth:
      token_env: GITHUB_TOKEN   # ignored by --backend local (reads local files)
