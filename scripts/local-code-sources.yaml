# Code-only LOCAL build (dev-guide 06-observability). Builds this repo's Python source from the
# local checkout via `--backend local` — NO GitHub/ADO tokens, NO LLM (code extraction
# is deterministic/zero-LLM), NO Ollama. Produces code_symbols + search_text + the
# defined_in/calls/imports graph: everything the MCP broker + agent runner need.
version: 1
defaults:
  acl_teams: []          # [] = org-public (any authenticated subject)
sources:
  - name: platform-code
    type: github_code
    repo: RohitSh26/agentic-kb-platform
    branch: main
    include:
      - "services/**/*.py"
      # Tests ARE indexed (no exclude): the BUILD lane (agent writes code) needs a
      # target's OWN test file in the graph so change_pack can resolve it and run it.
      # Still zero-LLM — code + test extraction is deterministic.
    auth:
      token_env: GITHUB_TOKEN   # ignored by --backend local (reads local files)
