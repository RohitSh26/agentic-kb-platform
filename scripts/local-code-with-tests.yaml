# Code + TESTS local build for the BUILD lane (M1). Same as local-code-sources.yaml but
# KEEPS test files, so context_create_change_pack can resolve a task's real test file from
# the KB (e.g. test_github_rest_backend.py) instead of guessing the name. Use this KB when
# you want the agent_runner BUILD lane to write code; use local-code-sources.yaml (no tests)
# for the leaner EXPLAIN-lane / eval baseline KB.
#
#   uv run --project services/kb-builder python -m agentic_kb_builder.build \
#       --backend local --sources scripts/local-code-with-tests.yaml
version: 1
defaults:
  acl_teams: []          # [] = org-public (any authenticated subject)
sources:
  - name: platform-code-and-tests
    type: github_code
    repo: RohitSh26/agentic-kb-platform
    branch: main
    include:
      - "services/**/*.py"   # includes services/**/tests/**/*.py (no exclude)
    auth:
      token_env: GITHUB_TOKEN   # ignored by --backend local (reads local files)
