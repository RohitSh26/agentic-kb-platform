[project]
name = "contracts"
version = "0.1.0"
description = "Shared contract boundary: MCP tool schemas, build artifact schemas, agent output schemas"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/contracts"]
