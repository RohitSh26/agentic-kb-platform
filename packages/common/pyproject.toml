[project]
name = "common"
version = "0.1.0"
description = "Shared utilities: hashing, structured logging, token budgeting, search client"
requires-python = ">=3.12"
dependencies = ["contracts", "azure-search-documents>=11.5"]

[tool.uv.sources]
contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/common"]
