[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os
# DATABASE_URL env var takes precedence; see alembic/env.py
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = ts=%%(asctime)s level=%%(levelname)s logger=%%(name)s msg=%%(message)s
