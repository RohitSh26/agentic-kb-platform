id: tests-for-similar-endpoint
task_type: find_tests_for_similar_endpoint
task: "find tests covering the checkout endpoint similar to the new refunds endpoint"
approved_context_plan: "locate endpoint test suites and shared fixtures for checkout"
budget_tokens: 8000
fixtures:
  artifacts:
    - key: checkout_tests
      title: "Checkout endpoint tests"
      body_text: "tests/api/test_checkout.py covers POST /checkout success and test_checkout_rejects_negative_amounts."
      authority_score: 0.9
    - key: test_fixtures
      title: "Endpoint test fixtures"
      body_text: "Shared fixtures live in tests/api/conftest.py: client_fixture builds an authenticated test client."
      authority_score: 0.8
  search_seeds:
    - keyword: tests
      hits: [checkout_tests]
    - keyword: checkout
      hits: [checkout_tests]
    - keyword: fixtures
      hits: [test_fixtures]
script:
  - tool: context.request_more
    agent: test-agent
    question: "are there shared fixtures for endpoint tests"
    why_needed: "the pack lists the suite but not its fixtures"
    decision_needed: "whether refund tests can reuse the existing client fixture"
    max_tokens: 1500
  - tool: context.request_more
    agent: test-agent
    question: "are there shared fixtures for endpoint tests"
    why_needed: "re-checking the same fixture question while drafting the plan"
    decision_needed: "same decision; expect a reused answer"
    max_tokens: 1500
agent_output:
  claims:
    - claim: "tests/api/test_checkout.py pins the checkout endpoint behavior to mirror"
      evidence: [checkout_tests]
    - claim: "Refund tests can reuse client_fixture from tests/api/conftest.py"
      evidence: [test_fixtures]
expected:
  docs: [checkout_tests, test_fixtures]
  files: ["tests/api/conftest.py"]
  symbols: ["test_checkout_rejects_negative_amounts", "client_fixture"]
  tests: ["tests/api/test_checkout.py"]
  open_questions: []
