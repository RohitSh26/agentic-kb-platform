id: conflicting-retention-evidence
task_type: detect_conflicting_evidence
task: "detect conflicting evidence about the session retention window between wiki and code"
approved_context_plan: "compare the wiki retention policy with the current session store implementation"
budget_tokens: 8000
fixtures:
  artifacts:
    - key: wiki_retention
      title: "Wiki: session retention policy"
      body_text: "The wiki states sessions are retained for 30 days."
      knowledge_kind: interpreted
      authority_score: 0.5
    - key: code_retention
      title: "Session store retention"
      body_text: "sessions/store.py sets RETENTION_DAYS = 90; sessions purge after 90 days."
      authority_score: 0.9
  search_seeds:
    - keyword: retention
      hits: [code_retention, wiki_retention]
    - keyword: wiki
      hits: [wiki_retention]
    - keyword: session
      hits: [code_retention]
script:
  - tool: context.open_evidence
    agent: review-agent
    evidence: code_retention
    max_tokens: 300
agent_output:
  claims:
    - claim: "The session store retains sessions for 90 days via RETENTION_DAYS"
      evidence: [code_retention]
    - claim: "The wiki documents a 30 day session retention"
      evidence: [wiki_retention]
  open_questions:
    - "wiki retention (30 days) conflicts with sessions/store.py RETENTION_DAYS = 90 — which is authoritative?"
expected:
  docs: [wiki_retention, code_retention]
  files: ["sessions/store.py"]
  symbols: ["RETENTION_DAYS"]
  tests: []
  open_questions: ["conflicts with sessions/store.py"]
