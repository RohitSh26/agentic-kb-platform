id: plan-new-refunds-endpoint
task_type: plan_new_endpoint
task: "plan a new refunds endpoint following the existing checkout endpoint patterns"
approved_context_plan: "review endpoint conventions and the service layer wiring for checkout"
budget_tokens: 8000
fixtures:
  artifacts:
    - key: endpoint_conventions
      title: "Checkout endpoint conventions"
      body_text: "Endpoints live in checkout/api/router.py and register via register_routes; request models validate input."
      authority_score: 0.9
    - key: service_wiring
      title: "Checkout service layer wiring"
      body_text: "Route handlers call CheckoutService in checkout/service.py; persistence stays behind CheckoutRepository."
      authority_score: 0.85
    - key: refund_prior_art
      title: "Refund handling notes"
      body_text: "A refund stub already exists in checkout/service.py; refund flows mirror checkout validation."
      authority_score: 0.7
  search_seeds:
    - keyword: endpoint
      hits: [endpoint_conventions]
    - keyword: checkout
      hits: [endpoint_conventions, service_wiring]
    - keyword: service
      hits: [service_wiring]
    - keyword: refund
      hits: [refund_prior_art]
script:
  - tool: context.request_more
    agent: impl-agent
    question: "what refund handling exists already in the service layer"
    why_needed: "the pack covers checkout conventions but not prior refund work"
    decision_needed: "whether to extend the existing refund stub or add a new module"
    max_tokens: 1500
  - tool: context.request_more
    agent: test-agent
    question: "what refund handling exists already in the service layer"
    why_needed: "need the same prior-art context to plan test coverage"
    decision_needed: "which refund behavior the tests must pin"
    max_tokens: 1500
agent_output:
  claims:
    - claim: "New endpoints register via register_routes in checkout/api/router.py"
      evidence: [endpoint_conventions]
    - claim: "The refunds endpoint should call the service layer like CheckoutService"
      evidence: [service_wiring]
    - claim: "A refund stub already exists in checkout/service.py and should be extended"
      evidence: [refund_prior_art]
expected:
  docs: [endpoint_conventions, service_wiring, refund_prior_art]
  files: ["checkout/api/router.py", "checkout/service.py"]
  symbols: ["register_routes", "CheckoutService"]
  tests: []
  open_questions: []
