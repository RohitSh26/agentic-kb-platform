id: platform-trust-gate
task_type: retrieval_recall
task: "official client platform trust webhook"
approved_context_plan: "decide whether the client's answer is platform-trusted"
budget_tokens: 8000
# The context.platform_trust gate (ADR-0011 §6) is the only enforceable boundary
# against agents we do not control: a verification_required client is platform-
# trusted ONLY with a valid, client-matched, passing, signed receipt. This case
# asserts the F2 pair for a verification_required client:
#   1. present_receipt: a signed receipt over retrieved evidence ⇒ status "trusted";
#   2. no receipt ⇒ a STRUCTURED "denied" (never a silent pass).
fixtures:
  artifacts:
    - key: webhook_evidence
      title: "Webhook delivery retry policy"
      body_text: "Webhook delivery retries 3 times with backoff before alerting."
      authority_score: 0.9
  search_seeds:
    - keyword: webhook
      hits: [webhook_evidence]
script:
  # trusted: a verification_required client presents a signed receipt over evidence
  # it retrieved; the gate validates the signature + client binding ⇒ trusted.
  - tool: context.platform_trust
    agent: impl-agent
    verification_required: true
    present_receipt: true
    answer_id: "ans-webhook-trusted"
    claim: "Webhook delivery retries 3 times before alerting."
    evidence: [webhook_evidence]
    retrieved: [webhook_evidence]
    expect_status: trusted
  # denied: the same verification_required client presents NO receipt ⇒ denied
  # (verification_required_no_receipt) — the structured refusal, not a silent pass.
  - tool: context.platform_trust
    agent: impl-agent
    verification_required: true
    present_receipt: false
    expect_status: denied
expected:
  docs: [webhook_evidence]
