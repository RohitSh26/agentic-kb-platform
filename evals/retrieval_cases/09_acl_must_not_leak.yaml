id: acl-must-not-leak
task_type: retrieval_recall
task: "deployment credentials rotation runbook"
approved_context_plan: "find the deployment runbook for credential rotation"
budget_tokens: 8000
# F7 ACL negative: a team-less requester (requester_teams empty) asks a query that
# matches BOTH an org-public runbook and a team-restricted secrets artifact. The
# broker's team_acl_v1 filter must suppress the restricted artifact — it must NEVER
# appear in a returned card. The public runbook still surfaces (recall preserved),
# proving the filter is selective, not a blanket drop.
requester_teams: []
must_not_leak: [restricted_secrets]
fixtures:
  artifacts:
    - key: rotation_runbook
      title: "Credential rotation runbook"
      body_text: "Rotate deployment credentials quarterly via the rotation runbook."
      authority_score: 0.9
    - key: restricted_secrets
      title: "Deployment secrets vault index"
      body_text: "Index of deployment credentials, restricted to the security team."
      authority_score: 0.95
      acl_teams: [security]
  search_seeds:
    - keyword: deployment
      hits: [rotation_runbook, restricted_secrets]
expected:
  docs: [rotation_runbook]
