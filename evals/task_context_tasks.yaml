# Task-context golden set. Each task is a realistic dev request against the INDEXED repo
# (agentic-kb-platform). `gold_files` is the expert-labelled set of files an agent must
# see to do the task. The eval asks: does seed retrieval + graph expansion surface that
# full context within a token budget, WITHOUT the agent reading whole files?
#
# Paths are repo-relative source paths (source_item.path). kb-builder paths share the
# prefix services/kb-builder/src/agentic_kb_builder/ ; mcp-server paths share
# services/mcp-server/src/agentic_mcp_server/.

tasks:
  - id: gitlab-connector
    query: >-
      Add a GitLab connector that ingests source code from a GitLab repository as a new
      source type, wired into the build like the existing GitHub code connector.
    gold_files:
      - services/kb-builder/src/agentic_kb_builder/connectors/source_connector.py
      - services/kb-builder/src/agentic_kb_builder/connectors/config_loader.py
      - services/kb-builder/src/agentic_kb_builder/connectors/github_code.py
      - services/kb-builder/src/agentic_kb_builder/connectors/github_rest.py
      - services/kb-builder/src/agentic_kb_builder/connectors/production_factory.py
      - services/kb-builder/src/agentic_kb_builder/domain/source_config.py

  - id: publish-gate
    query: >-
      Add a new publish gate that blocks activating a kb_version when a quality check
      fails, recorded on the build run.
    gold_files:
      - services/kb-builder/src/agentic_kb_builder/application/publish_gates.py
      - services/kb-builder/src/agentic_kb_builder/infrastructure/postgres/models/kb_build_run.py
      - services/kb-builder/src/agentic_kb_builder/build.py

  - id: code-search-text
    query: >-
      Make code symbols keyword-searchable by extracting a deterministic search_text from
      the AST and projecting it into the search index.
    gold_files:
      - services/kb-builder/src/agentic_kb_builder/graphify/span_recovery.py
      - services/kb-builder/src/agentic_kb_builder/graphify/graphify_backend.py
      - services/kb-builder/src/agentic_kb_builder/indexing/projection.py
      - services/kb-builder/src/agentic_kb_builder/indexing/search_document.py

  - id: broker-budget
    query: >-
      Enforce a per-agent token budget when the context broker assembles an evidence pack
      for a retrieval request.
    gold_files:
      - services/mcp-server/src/agentic_mcp_server/context_broker/budgets.py
      - services/mcp-server/src/agentic_mcp_server/context_broker/dependencies.py
      - services/mcp-server/src/agentic_mcp_server/context_broker/retrieval.py

  - id: mcp-ledger-tool
    query: >-
      Add an MCP tool that returns a user's recent retrieval events from the retrieval
      ledger, filtered by the requesting agent.
    gold_files:
      - services/kb-builder/src/agentic_kb_builder/infrastructure/postgres/models/retrieval_event.py
      - services/mcp-server/src/agentic_mcp_server/context_broker/ledger.py
      - services/mcp-server/src/agentic_mcp_server/context_broker/graph.py
