# Local spin-up of the whole system (PR-17): Postgres (the truth store), a
# one-shot kb-builder migration job (it owns the schema — ADR-0008), and the
# MCP Context Broker. This is a local convenience, not the deployment story —
# that is infra/ (Azure). Guide: docs/dev-guide/contributors/testing-and-builds.md §Docker.
#
# The Entra values are identifiers, never secrets; the placeholders boot the
# stack, but no bearer token verifies until you set a real tenant (auth is
# fail-closed by design — there is no auth-off switch).

name: agentic-kb-platform

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres # compose-internal local default, same as CI
      POSTGRES_DB: agentic_kb
    ports:
      # 55432 by default so a Homebrew Postgres on 5432 keeps working
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # -h 127.0.0.1 forces TCP: first-boot init runs a socket-only temporary
      # server that pg_isready would otherwise report healthy too early
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U postgres -d agentic_kb"]
      interval: 2s
      timeout: 3s
      retries: 30

  # One-shot: applies Alembic migrations and exits (it owns the schema, ADR-0008).
  # The end-to-end `build` CLI exists (PR-22), but this container is deliberately
  # migrations-only — a populated KB comes from the optional `kb-build` profile
  # below (or a local `python -m agentic_kb_builder.build`). Wiring the nightly
  # pipeline into compose remains the recorded follow-up.
  kb-builder:
    build: ./services/kb-builder
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/agentic_kb
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  # OPTIONAL, profile-gated one-shot: `docker compose --profile build up` runs a
  # full no-cloud build into Postgres and activates the new kb_version, so the
  # stack comes up serving a real KB (/health then answers 200). Without the
  # profile this service never starts (default `up` stays migrations-only).
  #
  # It reuses the kb-builder image, mounts the repo read-only at /workspace for
  # the local-FS fetch backend + git-metadata connector, and reaches an Ollama
  # running on the HOST (host.docker.internal) for docify — point LLM_* elsewhere
  # to use a hosted provider (docs/dev-guide/how-to/switch-llm-providers.md). Build
  # activation is the CLI
  # default; pass nothing to activate, --no-activate to skip.
  kb-build:
    profiles: ["build"]
    build: ./services/kb-builder
    command:
      - python
      - -m
      - agentic_kb_builder.build
      - --workspace
      - /workspace
      - --sources
      - /workspace/services/kb-builder/sources.example.yaml
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/agentic_kb
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-llama3.1}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
    volumes:
      - ./:/workspace:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"
    depends_on:
      kb-builder:
        condition: service_completed_successfully

  # Never runs migrations — starts only after kb-builder has applied them.
  # /health answers 503 (no_active_kb_version) on a fresh volume: readiness
  # honesty, not a failure.
  mcp-server:
    build: ./services/mcp-server
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/agentic_kb
      MCP_ENTRA_TENANT_ID: ${MCP_ENTRA_TENANT_ID:-00000000-0000-0000-0000-000000000000}
      MCP_ENTRA_AUDIENCE: ${MCP_ENTRA_AUDIENCE:-api://agentic-kb-local}
      # optional subject -> allowance JSON (identifiers only); empty = defaults
      MCP_AGENT_ALLOWANCES: ${MCP_AGENT_ALLOWANCES:-}
    ports:
      - "${MCP_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      kb-builder:
        condition: service_completed_successfully

volumes:
  pgdata:
