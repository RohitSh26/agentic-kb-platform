# Source configuration for the nightly KB build — schema version 1.
# Contract: docs/contracts/source-config.md (this file is pinned by a contract test).
#
# Secrets are referenced by environment-variable NAME only (auth.token_env);
# token values live exclusively in the build environment, never in this file.

version: 1

defaults:
  acl_teams: []          # [] = org-public (any authenticated subject)

# Optional. git_metadata mines the LOCAL --workspace's own git history (it has no
# sources: entry of its own); repo names the SAME (repo, path) scope this workspace's
# github_code/github_doc sources below populate, so commit ACLs + commit-mined
# aliases resolve against them. Omit this block entirely when every enabled
# github_code/github_doc source below shares one repo (as they do here) — that
# shared value is derived automatically (docs/contracts/source-config.md).
git_metadata:
  repo: RohitSh26/agentic-kb-platform

sources:
  # All four types fetch for real with --backend production (each pins to a
  # deterministic version). You set IDENTIFIERS, not URLs: github_* build from
  # repo+branch (api.github.com); azure_wiki/ado_card build from organization+
  # project (dev.azure.com). Replace contoso/platform below with your own. The only
  # connector backlog item is managed-identity auth instead of PATs. See dev-guide 06.
  - name: platform-code
    type: github_code
    repo: RohitSh26/agentic-kb-platform
    branch: main
    include:
      - "services/**/*.py"
    exclude:
      - "**/tests/**"
    auth:
      token_env: GITHUB_TOKEN

  - name: platform-docs
    type: github_doc
    repo: RohitSh26/agentic-kb-platform
    branch: main
    include:
      - "docs/**/*.md"
      - "README.md"
    auth:
      # auth.token_env is OPTIONAL in the schema — omit it ONLY for a PUBLIC repo.
      # This repo is private, so (like platform-code above) it MUST send a token, or
      # GitHub returns 404 on every request. When in doubt, set it.
      token_env: GITHUB_TOKEN

  - name: platform-wiki
    type: azure_wiki
    organization: contoso
    project: platform
    wiki: platform.wiki
    include:
      - "Architecture/**"
      - "Runbooks/**"
    exclude:
      - "Archive/**"
    acl_teams: ["platform-eng"]
    auth:
      token_env: ADO_PAT

  - name: roadmap-cards
    type: ado_card
    organization: contoso
    project: platform
    area_path: "Platform\\KB"
    work_item_types: ["User Story", "Bug"]
    states: ["Active", "Resolved", "Closed"]
    auth:
      token_env: ADO_PAT
